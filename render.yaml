services:
  - type: web
    name: nelonclient
    runtime: node
    rootDir: backend
    buildCommand: npm install && mkdir -p public && cp -r ../index.html ../config.json ../assets ../icon.svg ../turnstile-mock.js public/ 2>/dev/null || true
    startCommand: node server.js
    envVars:
      - key: PORT
        value: 3000
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: BASE_URL
        value: https://nelonclient.onrender.com
